<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPerception — Investor Demo</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;">
      <h1>EasyPerception</h1>
      <span class="subtitle">Real-time Vision Intelligence</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('farm')">Scene Analysis</button>
      <button class="tab-btn" onclick="switchTab('watch')">Agent</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Video Panel -->
    <div class="video-panel">
      <img id="videoFeed" src="/stream" alt="Live Feed">
      <canvas id="zoneCanvas" class="hidden"></canvas>
      <div id="drawHint" class="draw-hint hidden">Drag to select area</div>
    </div>

    <!-- Side Panel: Farm Demo -->
    <div class="side-panel" id="farmPanel">
      <div class="chat-container">
        <div class="chat-header">Ask about what the camera sees</div>
        <div class="suggestions">
          <span class="suggestion-chip" onclick="sendQuery(this.textContent)">What do you see?</span>
          <span class="suggestion-chip" onclick="sendQuery(this.textContent)">Count the cows</span>
          <span class="suggestion-chip" onclick="sendQuery(this.textContent)">How many people?</span>
          <span class="suggestion-chip" onclick="sendQuery(this.textContent)">Any animals?</span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="message system">
            Welcome! Ask me anything about what the camera sees. I'll analyze the scene in real-time.
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput"
                 placeholder="Ask a question..." autocomplete="off"
                 onkeydown="if(event.key==='Enter')sendQuery()">
          <button class="send-btn" id="sendBtn" onclick="sendQuery()">Send</button>
        </div>
      </div>
    </div>

    <!-- Side Panel: Agent Chat (triggers monitoring via conversation) -->
    <div class="side-panel hidden" id="watchPanel">
      <div class="chat-container">
        <div class="chat-header">
          Agent
          <div class="status-indicator" style="padding:4px 0;border:none;">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText" style="font-weight:400;font-size:12px;color:var(--text-dim)">Ready</span>
          </div>
        </div>
        <div class="chat-messages" id="watchMessages">
        </div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="watchInput"
                 placeholder="e.g. Watch this area, alert me if someone comes..."
                 autocomplete="off"
                 onkeydown="if(event.key==='Enter')sendWatchCommand()">
          <button class="send-btn" id="watchSendBtn" onclick="sendWatchCommand()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
